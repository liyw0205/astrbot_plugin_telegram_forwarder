name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2
        with:
          persist-credentials: false

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: python3 .github/scripts/changelog_section.py "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          NOTES_FOUND: ${{ steps.notes.outputs.found }}
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            if [ "${NOTES_FOUND}" = "true" ]; then
              gh release edit "${TAG_NAME}" --title "${TAG_NAME}" --notes-file notes.md
            else
              gh release edit "${TAG_NAME}" --title "${TAG_NAME}"
            fi
            exit 0
          fi

          if [ "${NOTES_FOUND}" = "true" ]; then
            gh release create "${TAG_NAME}" --title "${TAG_NAME}" --notes-file notes.md
          else
            gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes
          fi
